<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChromaPro Color Picker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <img src="icons/icon128.png" alt="ChromaPro Logo" class="logo-img">
        <h1>ChromaPro</h1>
      </div>
    </header>

    <main>
      <div class="picker-section">
        <button id="pickBtn" class="primary-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
          Pick Color
        </button>
        <div class="current-color-card" id="colorDisplay">
          <div class="card-top">
            <div class="color-preview" id="colorPreview"></div>
            <div class="accessibility-badge" id="contrastBadge">White Text</div>
          </div>
          
          <div class="color-info">
            <div class="value-row" data-type="hex">
              <span class="label">HEX</span>
              <span class="value" id="hexText">#6366F1</span>
            </div>
            <div class="value-row" data-type="rgb">
              <span class="label">RGB</span>
              <span class="value" id="rgbText">rgb(99, 102, 241)</span>
            </div>
            <div class="value-row" data-type="hsl">
              <span class="label">HSL</span>
              <span class="value" id="hslText">hsl(239, 84%, 67%)</span>
            </div>
          </div>
        </div>
      </div>

      <div id="toast" class="toast">Copied to clipboard!</div>

      <section class="palette-section">
        <div class="tabs">
          <button class="tab-btn active" data-mode="tints">Tints</button>
          <button class="tab-btn" data-mode="analogous">Analogous</button>
          <button class="tab-btn" data-mode="complementary">Complementary</button>
        </div>
        <div class="palette-grid" id="paletteGrid">
          <!-- Generated palette will be injected here -->
        </div>
      </section>

      <section class="history-section">
        <div class="section-header">
          <h2>Recent History</h2>
          <button id="clearHistory" class="text-btn">Clear</button>
        </div>
        <div class="history-grid" id="historyGrid">
          <!-- History items will be injected here -->
        </div>
      </section>
    </main>

    <footer>
      <p>ChromaPro: Precision Color Tools</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
